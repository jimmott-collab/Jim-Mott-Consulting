<style>
  :root {
    --cream: #e8e0d4;
    --green: #3fc85e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  @font-face {
    font-family: 'Amstrad PC';
    src: url('amstrad-ac.woff2') format('woff2');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  html, body {
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  body {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) 12px env(safe-area-inset-bottom);
  }

  .front-door {
    width: 100%;
    max-width: min(96vw, 640px);
    max-height: 94dvh;
    height: auto;
    display: block;
  }

  /* geometry */
  .geo { stroke: var(--green); stroke-width: 1.1; fill: none; }
  .dot {
    stroke: var(--green);
    stroke-width: 1.1;
    fill: none;
    stroke-dasharray: 1.4 2.8;
    stroke-linecap: round;
  }

  /* type */
  .front-door text {
    font-family: 'Amstrad PC', monospace;
    fill: var(--cream);
    dominant-baseline: central;
  }
  .masthead { font-size: 15px; }
  .label    { font-size: 14px; }
  .accent   { fill: var(--green); }

  /* nav nodes */
  a.node { cursor: pointer; }
  a.node text { transition: fill 0.25s ease; }
  a.node:hover text,
  a.node:focus-visible text { fill: var(--green); }
  a.node:hover .accent,
  a.node:focus-visible .accent { fill: var(--cream); }
  a.node:focus-visible { outline: none; }
  .hit { fill: none; pointer-events: all; }   /* generous tap target */
</style>
</head>
<body>

  <svg class="front-door" viewBox="0 0 524 414" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="navigation" aria-label="Twins Are Birds">

    <!-- flower (back layer) — swap src for a still frame if you'd rather it didn't animate -->

    <circle class="geo" cx="250" cy="238" r="57"></circle>
    <polygon class="geo" points="247,132 159,284 337,284"></polygon>

    <!-- dotted connectors: each green letter to its vertex -->
    <line class="dot" x1="247" y1="108" x2="247" y2="131"></line>
    <line class="dot" x1="158" y1="284" x2="137" y2="286"></line>
    <line class="dot" x1="338" y1="284" x2="361" y2="287"></line>

    <!-- masthead -->
    <text class="masthead" x="247" y="27" text-anchor="middle">TWINS ARE BIRDS</text>

    <!-- nav nodes (one green letter each) -->
    <a class="node" href="about.html" aria-label="About">
      <rect class="hit" x="214" y="86" width="68" height="24"></rect>
      <text class="label" x="248" y="98" text-anchor="middle">AB<tspan class="accent">O</tspan>UT</text>
    </a>

    <a class="node" href="menu.html" aria-label="Thinking">

    </a>

  </svg>

</body>
