<style>
  :root {
    --cream: #e8e0d4;
    --green: #3fc85e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  @font-face {
    font-family: 'Amstrad PC';
    src: url('amstrad-ac.woff2') format('woff2');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
  }

  html, body {
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  body {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: env(safe-area-inset-top) 8px env(safe-area-inset-bottom);
  }

  .front-door {
    width: 100%;
    height: 100dvh;
    display: block;
  }

  /* geometry */
  .geo { stroke: var(--green); stroke-width: 1.1; fill: none; }
  .dot {
    stroke: var(--green);
    stroke-width: 1.1;
    fill: none;
    stroke-dasharray: 1.4 2.8;
    stroke-linecap: round;
  }

  /* type */
  .front-door text {
    font-family: 'Amstrad PC', monospace;
    fill: var(--cream);
    dominant-baseline: central;
  }
  .masthead { font-size: 15px; }
  .label    { font-size: 14px; }
  .accent   { fill: var(--green); }
  .subhead {
    font-size: 9px;
    letter-spacing: 0.12em;
    fill: rgba(232,224,212,0.55);
    transition: opacity 1s ease;
  }

  /* nav nodes */
  a.node { cursor: pointer; }
  a.node text { transition: fill 0.25s ease; }
  a.node:hover text,
  a.node:focus-visible text { fill: var(--green); }
  a.node:hover .accent,
  a.node:focus-visible .accent { fill: var(--cream); }
  a.node:focus-visible { outline: none; }
  .hit { fill: none; pointer-events: all; }   /* generous tap target */

  /* desktop only: shrink the whole assemblage ~10% so the flower clears the bottom.
     mobile (< 768px) is untouched. */
  @media (min-width: 768px) {
    .scaler {
      transform: scale(0.9);
      transform-box: view-box;
      transform-origin: 248px 150px;
    }
  }

  /* mobile: enlarge the lockup so it reads at the same scale as the interior pages */
  @media (max-width: 767px) {
    body { padding-left: 0; padding-right: 0; }
    .masthead { font-size: 19px; }
    .subhead  { font-size: 10px; }
  }

  /* ── boot sequence ──
     With JS on, the title is hidden until it types and the triangle group
     is hidden until it blinks in. No-JS / reduced-motion show the finished page. */
  html.js .masthead            { visibility: hidden; }
  html.js #assembly            { opacity: 0; }
  html.js .subhead             { opacity: 0; }
  html.js #assembly:not(.reveal) { pointer-events: none; }

  @keyframes blinkIn {
    0%   { opacity: 0; }
    12%  { opacity: 1; }
    24%  { opacity: 0; }
    40%  { opacity: 1; }
    56%  { opacity: 0; }
    72%  { opacity: 1; }
    100% { opacity: 1; }
  }
  #assembly.reveal { animation: blinkIn 0.5s steps(1, end) forwards; }

  @media (prefers-reduced-motion: reduce) {
    html.js .masthead { visibility: visible; }
    html.js #assembly { opacity: 1; }
    html.js .subhead  { opacity: 1; }
    html.js .contact  { opacity: 1; }
    #assembly.reveal  { animation: none; }
  }
  /* fixed contact — mirrors the HOME crumb on interior pages, bottom-right, green */
  .contact{
    position:fixed;
    bottom:calc(env(safe-area-inset-bottom) + 16px);
    right:calc(env(safe-area-inset-right) + 30px);
    font-family:'Amstrad PC',monospace;
    font-size:11px; letter-spacing:0.16em;
    color:var(--green);
    text-decoration:none;
    z-index:200; -webkit-tap-highlight-color:transparent;
    transition:color .25s ease, opacity 1s ease;
  }
  .contact:hover,.contact:focus-visible{ color:var(--cream); outline:none; }
  html.js .contact{ opacity:0; }   /* fades in with the boot reveal */
</style>

<body>

  <!-- viewBox cropped to the artwork (was 0 0 524 414) so it renders large on phones -->
  <svg class="front-door" viewBox="37 6 422 408" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" role="navigation" aria-label="Jim Mott Consulting">
  <g class="scaler">

    <!-- flower (back layer) — shown first, alone -->
    <image href="IMG_8360.GIF" xlink:href="IMG_8360.GIF" x="40.5" y="65" width="415" height="415"
           preserveAspectRatio="xMidYMid meet"></image>

    <!-- optional background asset (statue / streak from your mockup):
    <image href="your-asset.png" x="205" y="108" width="90" height="120"
           opacity="0.5" preserveAspectRatio="xMidYMid meet"></image>
    -->

    <!-- masthead — types out with a blinking block cursor -->
    <text class="masthead" x="248" y="20" text-anchor="middle">JIM MOTT CONSULTING</text>
    <text class="subhead" x="248" y="36" text-anchor="middle">STRATEGIC AND CULTURAL INSIGHT</text>

    <!-- everything below blinks into view together -->
    <g id="assembly">

      <!-- geometry: ring + triangle -->
      <circle class="geo" cx="247" cy="233" r="52"></circle>
      <polygon class="geo" points="247,132 159,284 337,284"></polygon>

      <!-- dotted connectors: each green letter to its vertex -->
      <line class="dot" x1="247" y1="108" x2="247" y2="131"></line>
      <line class="dot" x1="158" y1="284" x2="137" y2="286"></line>
      <line class="dot" x1="338" y1="284" x2="361" y2="287"></line>

      <!-- nav nodes (one green letter each) -->
      <a class="node" href="about.html" aria-label="About">
        <rect class="hit" x="214" y="86" width="68" height="24"></rect>
        <text class="label" x="248" y="98" text-anchor="middle">AB<tspan class="accent">O</tspan>UT</text>
      </a>

      <a class="node" href="thinking.html" aria-label="Thinking">
        <rect class="hit" x="40" y="274" width="104" height="24"></rect>
        <text class="label" x="140" y="286" text-anchor="end">THINKIN<tspan class="accent">G</tspan></text>
      </a>

      <a class="node" href="services.html" aria-label="Services">
        <rect class="hit" x="356" y="275" width="100" height="24"></rect>
        <text class="label" x="358" y="287" text-anchor="start"><tspan class="accent">S</tspan>ERVICES</text>
      </a>

    </g>
  </g>
  </svg>

  <script>
  (function () {
    var mast = document.querySelector('.masthead');
    var subhead = document.querySelector('.subhead');
    var assembly = document.getElementById('assembly');
    var FULL = 'JIM MOTT CONSULTING';
    var CURSOR = '\u2588';   // CP437 solid block — the Amstrad cursor

    var reduce = window.matchMedia &&
                 window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function run() {
      if (reduce) {
        mast.style.visibility = 'visible';
        if (subhead) subhead.style.opacity = '1';
        assembly.style.opacity = '1';
        var c0 = document.getElementById('contactLink'); if (c0) c0.style.opacity = '1';
        return;
      }

      // Measure the finished title so it lands centred, then type from the left edge
      var len = mast.getComputedTextLength();
      mast.setAttribute('text-anchor', 'start');
      mast.setAttribute('x', (248 - len / 2).toFixed(1));
      mast.textContent = '';
      mast.style.visibility = 'visible';

      var i = 0, cursorOn = true;
      function render() {
        mast.textContent = FULL.slice(0, i) + (cursorOn ? CURSOR : '');
      }
      var blink = setInterval(function () { cursorOn = !cursorOn; render(); }, 260);

      function typeNext() {
        if (i < FULL.length) {
          i++; cursorOn = true; render();
          setTimeout(typeNext, 105);
        } else {
          setTimeout(function () {        // let the cursor blink a few times
            clearInterval(blink);
            mast.textContent = FULL;       // settle, no cursor
            if (subhead) subhead.style.opacity = '1';   // fade in the tagline
            assembly.classList.add('reveal');
            var c1 = document.getElementById('contactLink'); if (c1) c1.style.opacity = '1';
          }, 780);
        }
      }

      setTimeout(typeNext, 700);           // flower alone, briefly
    }

    // Wait for the Amstrad font so measuring and the typed glyphs are correct
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(run);
    } else {
      run();
    }
  })();
  </script>

<a class="contact" id="contactLink" href="#" rel="nofollow" aria-label="Contact — email Jim Mott">CONTACT</a>
<script>
(function(){
  var email = ['jim','mott','is','here'].join('.') + '@' + 'gmail.com';
  var link = document.getElementById('contactLink');
  if(!link) return;
  link.href = 'mailto:' + email;
  var revert = null;
  function flash(msg){
    if(revert) clearTimeout(revert);
    link.textContent = msg;
    revert = setTimeout(function(){ link.textContent = 'CONTACT'; }, 2600);
  }
  link.addEventListener('click', function(){
    var copied = false;
    try{ if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(email); copied = true; } }catch(_){}
    if(!copied){
      try{
        var ta = document.createElement('textarea');
        ta.value = email; ta.setAttribute('readonly','');
        ta.style.position='absolute'; ta.style.left='-9999px';
        document.body.appendChild(ta); ta.select();
        copied = document.execCommand('copy'); document.body.removeChild(ta);
      }catch(_){}
    }
    flash(copied ? 'copied \u2713' : email);
  });
  // safety net: appear even if the boot sequence never fires
  setTimeout(function(){ link.style.opacity = '1'; }, 5000);
})();
</script>
