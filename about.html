<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script>document.documentElement.className = 'js';</script>
<title>About — Jim Mott</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400&display=swap');

:root{
  --cream:#e8e0d4;
  --green:#3fc85e;
}

/* Display font: "Amstrad PC" from The Ultimate Oldschool PC Font Pack
   by int10h.org — CC BY-SA 4.0. http://int10h.org/oldschool-pc-fonts/ */
@font-face{
  font-family:'Amstrad PC';
  src:url('amstrad-ac.woff2') format('woff2');
  font-weight:normal;
  font-style:normal;
  font-display:swap;
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;height:100%;
  background:#000;
  overflow:hidden;
}

body{
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:env(safe-area-inset-top) 8px env(safe-area-inset-bottom);
}

/* header (Amstrad) */
.page-head{
  padding-top:clamp(16px,4vh,40px);
  text-align:center;
}
.page-title{
  font-family:'Amstrad PC',monospace;
  color:var(--cream);
  font-size:clamp(16px,4.5vw,22px);
  font-weight:normal;
  letter-spacing:0.18em;
  display:inline-block;
  white-space:nowrap;
}
html.js .page-title{ visibility:hidden; }   /* hidden until it types out */

/* middle: copy + links */
.middle{
  flex:1;
  width:100%;
  min-height:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:clamp(14px,3vh,26px);
}

#copy-wrap{
  flex:1;
  min-height:0;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* body copy (Josefin Sans) */
.body-text{
  max-width:30rem;
  text-align:center;
  padding:0 24px;
}
.body-text p{
  font-family:'Josefin Sans',sans-serif;
  font-weight:300;
  font-size:clamp(15px,2.2vw,19px);
  letter-spacing:0.04em;
  line-height:1.8;
  color:var(--cream);
}

/* links beneath the copy (Amstrad) */
.page-links{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  margin-bottom:18px;
}
.page-links a{
  font-family:'Amstrad PC',monospace;
  color:var(--cream);
  font-size:clamp(13px,3.4vw,15px);
  letter-spacing:0.14em;
  text-decoration:none;
  transition:color 0.25s ease;
  -webkit-tap-highlight-color:transparent;
}
.page-links a:hover,
.page-links a:focus-visible{color:var(--green);}
.page-links a:focus-visible{outline:none;}

@media (prefers-reduced-motion: reduce){
  html.js .page-title{ visibility:visible; }
}

/* breadcrumb — DOS-path wayfinding back up the tree */
.crumb{
  position:fixed;
  top:calc(env(safe-area-inset-top) + 16px);
  left:calc(env(safe-area-inset-left) + 30px);
  padding:0;
  font-family:'Amstrad PC',monospace;
  font-size:11px; letter-spacing:0.16em;
  color:rgba(232,224,212,0.40);
  z-index:200; -webkit-tap-highlight-color:transparent;
}
.crumb a{ color:rgba(232,224,212,0.40); text-decoration:none; transition:color .25s ease; }
.crumb a:hover,.crumb a:focus-visible{ color:var(--green); outline:none; }
.crumb .sep{ opacity:.5; }
.crumb .here{ color:var(--cream); }
</style>
</head>
<body>
<nav class="crumb"><a href="index.html">JIM MOTT</a> <span class="sep">\</span> <span class="here">ABOUT</span></nav>

<header class="page-head"><h1 class="page-title" id="page-title">ABOUT</h1></header>
<main class="middle">
  <div id="copy-wrap">
    <div class="body-text">
      <p>My name is Jim Mott. I help my clients make sense of what people think and do, so they can build better things for them.</p>
    </div>
  </div>
  <nav class="page-links">
    <a href="Jim_Mott_CV_2026.pdf" download="Jim Mott CV 2026.pdf">CV</a>
    <a href="https://www.linkedin.com/in/jim-mott-anthro/" target="_blank" rel="noopener">LinkedIn</a>
    <a href="#" id="mailto-link">Contact</a>
  </nav>
</main>

<script>
// title types out with the Amstrad block cursor
(function(){
  var title  = document.getElementById('page-title');
  var FULL   = 'ABOUT';
  var CURSOR = '\u2588';   // CP437 solid block — the Amstrad cursor
  var reduce = window.matchMedia &&
               window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function run(){
    if(reduce){ title.textContent = FULL; title.style.visibility = 'visible'; return; }
    title.textContent = FULL;                 // measure finished width
    title.style.width = title.offsetWidth + 'px';
    title.style.textAlign = 'left';
    title.textContent = '';
    title.style.visibility = 'visible';

    var i = 0, on = true;
    function render(){ title.textContent = FULL.slice(0, i) + (on ? CURSOR : ''); }
    var blink = setInterval(function(){ on = !on; render(); }, 260);

    function type(){
      if(i < FULL.length){ i++; on = true; render(); setTimeout(type, 120); }
      else { setTimeout(function(){ clearInterval(blink); title.textContent = FULL; }, 900); }
    }
    setTimeout(type, 350);
  }
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(run); } else { run(); }
})();

// email assembled at runtime so the address isn't sitting in the markup for scrapers
(function(){
  var u = ['j','i','m','.','m','o','t','t','.','i','s','.','h','e','r','e','@','g','m','a','i','l','.','c','o','m'];
  var a = document.getElementById('mailto-link');
  if(a) a.href = 'mailto:' + u.join('');
})();
</script>

</body>
</html>
