<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script>document.documentElement.className = 'js';</script>
<title>About — Jim Mott</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400&display=swap');

:root{
  --cream:#e8e0d4;
  --green:#3fc85e;
}

/* Display font: "Amstrad PC" from The Ultimate Oldschool PC Font Pack
   by int10h.org — CC BY-SA 4.0. http://int10h.org/oldschool-pc-fonts/ */
@font-face{
  font-family:'Amstrad PC';
  src:url('amstrad-ac.woff2') format('woff2');
  font-weight:normal;
  font-style:normal;
  font-display:swap;
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  background:#000;
}

/* single column: title -> copy -> art -> links, centred in the viewport */
body{
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:
    calc(env(safe-area-inset-top) + clamp(10px,2.5vh,22px))
    8px
    calc(env(safe-area-inset-bottom) + clamp(10px,2.5vh,22px));
}
.stack{
  flex:1;
  width:100%;
  min-height:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:clamp(10px,2vh,18px);
}

/* header */
.page-head{ text-align:center; }
.page-title{
  font-family:'Amstrad PC',monospace;
  color:var(--cream);
  font-size:clamp(16px,4.5vw,22px);
  font-weight:normal;
  letter-spacing:0.18em;
  display:inline-block;
  white-space:nowrap;
}
html.js .page-title{ visibility:hidden; }   /* hidden until it types out */

/* copy */
.body-text{
  max-width:min(34rem,92vw);
  text-align:center;
  padding:0 16px;
}
.body-text p{
  font-family:'Josefin Sans',sans-serif;
  font-weight:300;
  font-size:clamp(12px,1.8vw,13px);
  letter-spacing:0.04em;
  line-height:1.8;
  color:var(--cream);
}
.body-text p + p{ margin-top:0.9em; }

/* art - the flexible element: shrinks to fill the space left by copy+links */
.art-wrap{
  flex:1 1 auto;
  min-height:0;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}
.collage{
  position:relative;
  width:0; height:0;          /* set by JS (sizeCollage) */
}
.collage .layer{
  position:absolute;
  display:block;
  width:100%; height:100%;    /* per-layer % set inline */
  object-fit:fill;            /* match the source artwork's exact scaling */
  -webkit-user-select:none; user-select:none; -webkit-user-drag:none;
}

/* links */
.page-links{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}
.page-links a{
  font-family:'Amstrad PC',monospace;
  color:var(--cream);
  font-size:clamp(13px,3.4vw,15px);
  letter-spacing:0.14em;
  text-decoration:none;
  transition:color 0.25s ease;
  -webkit-tap-highlight-color:transparent;
}
.page-links a:hover,
.page-links a:focus-visible{color:var(--green);}
.page-links a:focus-visible{outline:none;}

@media (prefers-reduced-motion: reduce){
  html.js .page-title{ visibility:visible; }
}

/* mobile: keep the art usefully large; the page may scroll if cramped */
@media (max-width:767px){
  .art-wrap{ min-height:56vh; }
}

/* desktop: lock to one screen - no scroll, wider reading column */
@media (min-width:768px){
  html,body{ height:100%; overflow:hidden; }
  body{ height:100dvh; }
  .body-text{ max-width:46rem; }
}

/* breadcrumb - DOS-path wayfinding back up the tree */
.crumb{
  position:fixed;
  top:calc(env(safe-area-inset-top) + 16px);
  left:calc(env(safe-area-inset-left) + 30px);
  padding:0;
  font-family:'Amstrad PC',monospace;
  font-size:11px; letter-spacing:0.16em;
  color:rgba(232,224,212,0.40);
  z-index:200; -webkit-tap-highlight-color:transparent;
}
.crumb a{ color:rgba(232,224,212,0.40); text-decoration:none; transition:color .25s ease; }
.crumb a:hover,.crumb a:focus-visible{ color:var(--green); outline:none; }
.crumb .sep{ opacity:.5; }
.crumb .here{ color:var(--cream); }
</style>
</head>
<body>
<nav class="crumb"><a href="index.html">HOME</a></nav>

<div class="stack">
  <header class="page-head"><h1 class="page-title" id="page-title">ABOUT</h1></header>

  <main class="body-text">
    <p>My name is Jim Mott. I am an Anthropologist with 15 years of experience working in market research.</p>
    <p>I help my clients make sense of what people think and do, so they can build better things for them.</p>
  </main>

  <div class="art-wrap">
    <div class="collage" id="collage">
      <!-- back -> front. about-figure.gif is the looping "video" layer,
           sandwiched between two pre-composited (rotated/opacity-baked) plates. -->
      <img class="layer" src="about-back.png"   alt="" style="left:0;top:0;width:100%;height:100%">
      <img class="layer" src="about-figure.gif" alt=""
           style="left:16.12%;top:10.01%;width:66.90%;height:41.08%;transform:rotate(41.54deg);transform-origin:center;">
      <img class="layer" src="about-front.png"  alt="" style="left:0;top:0;width:100%;height:100%">
    </div>
  </div>

  <nav class="page-links">
    <a href="Jim Mott CV_2026.pdf" download="Jim Mott CV 2026.pdf">Download CV</a>
    <a href="https://www.linkedin.com/in/jim-mott-anthro/" target="_blank" rel="noopener">Linkedin</a>
    <a href="#" id="mailto-link">Contact</a>
  </nav>
</div>

<script>
// title types out with the Amstrad block cursor
(function(){
  var title  = document.getElementById('page-title');
  var FULL   = 'ABOUT';
  var CURSOR = '\u2588';   // CP437 solid block - the Amstrad cursor
  var reduce = window.matchMedia &&
               window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function run(){
    if(reduce){ title.textContent = FULL; title.style.visibility = 'visible'; return; }
    title.textContent = FULL;
    title.style.width = title.offsetWidth + 'px';
    title.style.textAlign = 'left';
    title.textContent = '';
    title.style.visibility = 'visible';

    var i = 0, on = true;
    function render(){ title.textContent = FULL.slice(0, i) + (on ? CURSOR : ''); }
    var blink = setInterval(function(){ on = !on; render(); }, 260);

    function type(){
      if(i < FULL.length){ i++; on = true; render(); setTimeout(type, 120); }
      else { setTimeout(function(){ clearInterval(blink); title.textContent = FULL; }, 900); }
    }
    setTimeout(type, 350);
  }
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(run); } else { run(); }
})();

// size the collage to fit its container while holding the source aspect (819:1198)
(function(){
  var BW = 819, BH = 1198;
  function sizeCollage(){
    var wrap = document.querySelector('.art-wrap');
    var col  = document.getElementById('collage');
    if(!wrap || !col) return;
    var availW = wrap.clientWidth;
    var availH = wrap.clientHeight;
    if(availW <= 0 || availH <= 0){ setTimeout(sizeCollage, 50); return; }
    var scale = Math.min(availW / BW, availH / BH);
    col.style.width  = (BW * scale) + 'px';
    col.style.height = (BH * scale) + 'px';
  }
  window.addEventListener('resize', sizeCollage, {passive:true});
  window.addEventListener('load', sizeCollage);
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(sizeCollage); }
  if('ResizeObserver' in window){
    var w = document.querySelector('.art-wrap');
    if(w) new ResizeObserver(sizeCollage).observe(w);
  }
  sizeCollage();
})();

// email assembled at runtime so the address isn't sitting in the markup for scrapers
(function(){
  var u = ['j','i','m','.','m','o','t','t','.','i','s','.','h','e','r','e','@','g','m','a','i','l','.','c','o','m'];
  var a = document.getElementById('mailto-link');
  if(a) a.href = 'mailto:' + u.join('');
})();
</script>

</body>
</html>
