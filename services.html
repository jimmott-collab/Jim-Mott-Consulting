<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script>document.documentElement.className = 'js';</script>
<title>Services — Jim Mott</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400&display=swap');

:root{
  --cream:#e8e0d4;
  --green:#3fc85e;
}

/* Display font: "Amstrad PC" from The Ultimate Oldschool PC Font Pack
   by int10h.org — CC BY-SA 4.0. http://int10h.org/oldschool-pc-fonts/ */
@font-face{
  font-family:'Amstrad PC';
  src:url('amstrad-ac.woff2') format('woff2');
  font-weight:normal;
  font-style:normal;
  font-display:swap;
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  background:#000;            /* pure black so the video's black edges vanish into the page */
}

/* single column: title -> copy -> art -> links, centred in the viewport */
body{
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:
    calc(env(safe-area-inset-top) + clamp(10px,2.5vh,22px))
    8px
    calc(env(safe-area-inset-bottom) + clamp(10px,2.5vh,22px));
}
.stack{
  flex:1;
  width:100%;
  min-height:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:clamp(10px,2vh,18px);
}

/* header */
.page-head{ text-align:center; }
.page-title{
  font-family:'Amstrad PC',monospace;
  color:var(--cream);
  font-size:clamp(16px,4.5vw,22px);
  font-weight:normal;
  letter-spacing:0.18em;
  display:inline-block;
  white-space:nowrap;
}
html.js .page-title{ visibility:hidden; }   /* hidden until it types out */

/* copy */
.body-text{
  max-width:min(34rem,92vw);
  text-align:center;
  padding:0 16px;
}
.body-text p{
  font-family:'Josefin Sans',sans-serif;
  font-weight:300;
  font-size:clamp(12px,1.8vw,13px);
  letter-spacing:0.04em;
  line-height:1.8;
  color:var(--cream);
}
.body-text p + p{ margin-top:0.9em; }

/* art - the flexible element: shrinks to fill the space left by copy+links */
.art-wrap{
  flex:1 1 auto;
  min-height:0;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}
#art{
  max-height:100%;
  max-width:100%;
  height:auto;
  width:auto;
  display:block;
}

/* links */
.page-links{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}
.page-links a{
  font-family:'Amstrad PC',monospace;
  color:var(--cream);
  font-size:clamp(13px,3.4vw,15px);
  letter-spacing:0.14em;
  text-decoration:none;
  transition:color 0.25s ease;
  -webkit-tap-highlight-color:transparent;
}
.page-links a:hover,
.page-links a:focus-visible{color:var(--green);}
.page-links a:focus-visible{outline:none;}

@media (prefers-reduced-motion: reduce){
  html.js .page-title{ visibility:visible; }
}

@media (max-width:767px){
  .art-wrap{
    min-height:42vh;
  }

  #art{
    max-width:90%;
    max-height:90%;
  }
}

/* desktop: lock to one screen - no scroll, wider reading column */
@media (min-width:768px){
  html,body{ height:100%; overflow:hidden; }
  body{ height:100dvh; }
  .body-text{ max-width:46rem; }
}

/* breadcrumb - DOS-path wayfinding back up the tree */
.crumb{
  position:fixed;
  top:calc(env(safe-area-inset-top) + 16px);
  left:calc(env(safe-area-inset-left) + 30px);
  padding:0;
  font-family:'Amstrad PC',monospace;
  font-size:11px; letter-spacing:0.16em;
  color:rgba(232,224,212,0.40);
  z-index:200; -webkit-tap-highlight-color:transparent;
}
.crumb a{ color:rgba(232,224,212,0.40); text-decoration:none; transition:color .25s ease; }
.crumb a:hover,.crumb a:focus-visible{ color:var(--green); outline:none; }
.crumb .sep{ opacity:.5; }
.crumb .here{ color:var(--cream); }
</style>
</head>
<body>
<nav class="crumb"><a href="index.html">HOME</a></nav>

<div class="stack">
  <header class="page-head"><h1 class="page-title" id="page-title">SERVICES</h1></header>

  <main class="body-text">
    <p>I can set up and run besopke projects, integrate with teams on existing work, or provide targetted support with specific methodologies </p>
  </main>

  <div class="art-wrap">
    <video id="art" autoplay loop muted playsinline webkit-playsinline preload="auto" poster="butterfly-labyrinth-poster.jpg">
      <source src="butterfly-labyrinth.mp4" type="video/mp4">
      <source src="butterfly-labyrinth.webm" type="video/webm">
    </video>
  </div>

  <nav class="page-links">
    <a href="categories.html">Categories</a>
    <a href="methods.html">Methods</a>
  </nav>
</div>

<script>
// title types out with the Amstrad block cursor
(function(){
  var title  = document.getElementById('page-title');
  var FULL   = 'SERVICES';
  var CURSOR = '\u2588';   // CP437 solid block - the Amstrad cursor
  var reduce = window.matchMedia &&
               window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function run(){
    if(reduce){ title.textContent = FULL; title.style.visibility = 'visible'; return; }
    title.textContent = FULL;
    title.style.width = title.offsetWidth + 'px';
    title.style.textAlign = 'left';
    title.textContent = '';
    title.style.visibility = 'visible';

    var i = 0, on = true;
    function render(){ title.textContent = FULL.slice(0, i) + (on ? CURSOR : ''); }
    var blink = setInterval(function(){ on = !on; render(); }, 260);

    function type(){
      if(i < FULL.length){ i++; on = true; render(); setTimeout(type, 120); }
      else { setTimeout(function(){ clearInterval(blink); title.textContent = FULL; }, 900); }
    }
    setTimeout(type, 350);
  }
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(run); } else { run(); }
})();

// video autoplay
(function(){
  var v=document.getElementById('art');
  if(!v) return;
  v.muted=true;
  function tryPlay(){ var p=v.play(); if(p&&p.catch){ p.catch(function(){}); } }
  tryPlay();
  document.addEventListener('visibilitychange',function(){ if(!document.hidden) tryPlay(); });
  var once=function(){ tryPlay(); document.removeEventListener('touchstart',once); document.removeEventListener('click',once); };
  document.addEventListener('touchstart',once,{passive:true});
  document.addEventListener('click',once);
})();
</script>

</body>
</html>
